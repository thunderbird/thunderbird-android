---
name: PR - Update dependency guard for Dependabot PRs

# This workflow uses pull_request (not pull_request_target) because it only runs
# on same-repo dependabot PRs, guarded by head.repo.full_name. Same-repo PRs have
# write permissions and secret access without needing pull_request_target.
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - '**/*.gradle'
      - 'gradle/**'
      - 'gradlew'
      - '**/libs.versions.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || 'no-pr' }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  pr-update-dependency-guard:
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == 'thunderbird/thunderbird-android'
    runs-on: ubuntu-latest
    environment: botmobile
    timeout-minutes: 90
    steps:
      - name: App Token Generate
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        if: ${{ vars.BOT_CLIENT_ID }}
        id: app-token
        with:
          client-id: ${{ vars.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Setup Gradle environment
        uses: ./.github/actions/setup-gradle

      - name: Update dependency guard
        run: ./gradlew dependencyGuardBaseline

      - name: Commit and push changes if any
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug || 'github-actions'}}
          APP_USER_ID: ${{ vars.BOT_USER_ID || '41898282' }}
        run: |
          set -x

          git config --global user.name "${APP_SLUG}"
          git config --global user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git config user.name
            git config user.email
            git status
            git commit -m "chore(deps): Update dependency guard files on behalf of @dependabot"
            git log -n 2
            git push
          else
            echo "No changes to commit"
          fi

          set +x
